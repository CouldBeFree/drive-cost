# Use: docker compose up -d (without hyphen)
# =============================================================================
# Docker Compose — DriveCost App + Observability (Loki stack)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: drivecost-postgres
    env_file:
      - .env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/migrations:/docker-entrypoint-initdb.d
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    labels:
      environment: ${ENVIRONMENT:-production}
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # DriveCost App (Nuxt 3)
  # ---------------------------------------------------------------------------
  app:
    image: ghcr.io/couldbefree/drive-cost:latest
    container_name: drivecost-app
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${APP_PORT:-3000}:3000'
    restart: unless-stopped
    networks:
      - app-network
      - edge-net
    labels:
      environment: ${ENVIRONMENT:-production}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M

  # ===========================================================================
  # Observability — Loki Stack
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Loki — centralized log storage
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.4.2
    container_name: drivecost-loki
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ['CMD-SHELL', 'wget --quiet --tries=1 --output-document=- http://localhost:3100/ready || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    labels:
      environment: ${ENVIRONMENT:-production}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Promtail — collects logs from Docker containers and ships to Loki
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.4.2
    container_name: drivecost-promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - app-network
    labels:
      environment: ${ENVIRONMENT:-production}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # Grafana — log visualization dashboard
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.6.0
    container_name: drivecost-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
      GF_LOG_LEVEL: warn
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - '${GRAFANA_PORT:-3001}:3000'
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - app-network
    labels:
      environment: ${ENVIRONMENT:-production}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 64M

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
  loki_data:
  grafana_data:

# =============================================================================
# Networks
# =============================================================================
networks:
  app-network:
    driver: bridge
  edge-net:
    external: true
