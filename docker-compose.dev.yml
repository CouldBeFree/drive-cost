# =============================================================================
# Docker Compose for Local Development
# =============================================================================
# Usage: docker compose -f docker-compose.dev.yml up

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: drivecost-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-drivecost}
      POSTGRES_USER: ${POSTGRES_USER:-drivecost_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drivecost_password}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./server/db/migrations:/docker-entrypoint-initdb.d
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-drivecost_user} -d ${POSTGRES_DB:-drivecost}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # DriveCost App (Development with hot reload)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      target: dev
    container_name: drivecost-app-dev
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-drivecost_user}:${POSTGRES_PASSWORD:-drivecost_password}@postgres:5432/${POSTGRES_DB:-drivecost}
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD:-dev_session_password_32_characters}
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data_dev:

networks:
  app-network:
    driver: bridge
